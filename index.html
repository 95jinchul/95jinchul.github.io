<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>간단한 HTML 예제</title>
</head>
<body>
    <h1>안녕하세요, Copilot입니다.</h1>
    <p>이것은 매우 간단한 HTML 문서입니다.</p>
    <p>HTML은 웹 페이지의 구조와 내용을 정의하는 언어입니다.</p>
    <p>HTML 문서는 여러 개의 요소로 구성됩니다.</p>
    <p>요소는 시작 태그와 종료 태그로 둘러싸인 콘텐츠로 이루어집니다.</p>
    <p>예를 들어, 이 문장은 &lt;p&gt; 요소 안에 있습니다.</p>
</body>
</html>
